<!DOCTYPE html>
<html lang="pt-BR">
<head>

        }

        }
        input, button {

        }

            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        button:active { background: #6d28d9; }
        #resultado {
            background: #161b22;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            word-break: break-all;
            display: none;
            border: 1px solid #7c3aed;
        }
        #historico { margin-top: 30px; }
        .link-item {
            background: #21262d;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;

            border-left: 3px solid #7c3aed;
        }
        .apagar {
            float: right;
            background: #da3633;
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
        }
    </style>
</head>

        </div>

        <div id="historico">

            <div id="listaLinks"></div>
        </div>
    </div>
